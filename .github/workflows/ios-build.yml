name: iOS Build (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Check Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Compile Dart and prepare Flutter artifacts
        run: |
          flutter build ios --release --no-codesign 2>&1 || true
          echo "Flutter prepare done (expected failure at signing step)"

      - name: Build native with xcodebuild (no signing)
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios_build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/ios_build -name "Runner.app" -type d | head -1)
          echo "App found at: $APP_PATH"
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r piliotto-unsigned.ipa Payload/
          rm -rf Payload
          ls -lh piliotto-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: piliotto-ios-unsigned
          path: piliotto-unsigned.ipa
          if-no-files-found: error
